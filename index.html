<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snake Neon Pro v19</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
 <script src="config.js"></script>
 <script src="app.js"></script>
<style>

#audioControls{
  display:flex;
  gap:8px;
}

.mini-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  border:1px solid #00ffff;
  background:rgba(0,0,0,0.3);
  color:#00ffff;
  cursor:pointer;
  box-shadow:0 0 8px #00ffff33;
  transition:0.2s;
  backdrop-filter: blur(6px);
}

.mini-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px #00ffff88;
}

.mini-btn.active{
  background:#00ffff;
  color:#000;
  box-shadow:0 0 15px #00ffff;
}

body{
  margin:0;
  background:#0f172a;
  color:#e2e8f0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#leaderboard{
  margin-top:15px;
  padding:12px 18px;
  background: #5a0fd6; /* violeta vivo */
  color: #ff00ff; /* magenta */
  border: 2px solid #ff00ff;
  box-shadow: 0 0 15px #ff00ff;
  border-radius: 8px;
  min-width: 200px;
  background: linear-gradient(135deg, #5a0fd6, #2a0944);
}

#leaderboard h3{
  margin:0 0 8px 0;
  color:#ffffff;
  text-shadow: 0 0 8px #ff00ff;
}

#leaderboard div{
  margin:4px 0;
  font-size:14px;
}

#hud{
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:400px; /* mismo ancho del canvas */
  font-size:18px;
}
#leftHud{
  display:flex;
  gap:20px;
}


#container{position:relative;}

canvas{
  border:2px solid #38bdf8;
  background:transparent;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:transparent;
  text-align:center;
}

/*  BOTONES NEON */
.neon-btn{
  margin-top:10px;
  padding:10px 18px;
  border:2px solid #00ffff;
  background:transparent;
  color:#00ffff;
  cursor:pointer;
  font-weight:bold;
  letter-spacing:1px;
  transition:0.2s;
  box-shadow:0 0 8px #00ffff;
}

.neon-btn:hover{
  background:#00ffff;
  color:#000;
  box-shadow:0 0 15px #00ffff;
}

/* SCROLL SCORE */
#scrollScores{
  position:absolute;
  bottom:10px;
  width:100%;
  overflow:hidden;
  font-size:14px;
  opacity:0.8;
}
#blackout{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.5s ease;

  background: radial-gradient(circle at center,
    rgba(255,0,255,0.25),
   rgba(4, 46, 161, 0.2),
    rgba(0,0,0,0.95)
  );

  animation: neonPulse 1.2s infinite alternate;
  filter: blur(1px);
}

@keyframes neonPulse{
  from{
    filter: blur(1px) brightness(1);
  }
  to{
    filter: blur(2px) brightness(1.4);
  }
}
#scrollContent{
  display:inline-block;
  white-space:nowrap;
  animation:scroll 15s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(100%);}
  to{transform:translateX(-100%);}
}
</style>
</head>

<body>



<div id="hud">
  <div id="leftHud">
    <div id="score">Score: 0</div>
    <div id="level">Lvl: 1</div>
  </div>

  <div id="audioControls">
    <button id="musicBtn" class="mini-btn">🎵</button>
    <button id="sfxBtn" class="mini-btn">🔊</button>
  </div>
</div>

<div id="container">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="blackout"></div>
  <div id="overlay" class="overlay"></div>

  <div id="scrollScores">
    <div id="scrollContent"></div>
  </div>
</div>

<script>

// ===== CONFIG =====
let musicEnabled = true;
let sfxEnabled = true;
let foodSpawnTime = 0;
let lastTime = 0;
let moveProgress = 0;

function lerp(a, b, t){
  return a + (b - a) * t;
}
let musicTimer = 0;
let musicStep = 0;
let currentSong = 0;

const songs = [
  [220, 330, 440, 330], // lvl 1
  [330, 440, 550, 440], // lvl 2
  [440, 550, 660, 550], // lvl 3
  [660, 550, 440, 330], // lvl 4
];


const ENABLE_COLOR_CHANGE = true;

// ===== SUPABASE =====
let sb=null;
console.log("ENV:", window.env);
try{
  sb=window.supabase.createClient(
    window.env.SUPABASE_URL,
    window.env.SUPABASE_KEY
  );
}catch(e){console.error(e);}

// ===== DOM =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const overlay=document.getElementById("overlay");
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const scrollContent=document.getElementById("scrollContent");

// ===== GAME =====
const grid=20, tiles=20;

let snake, velocity, nextVelocity, food;
let score, level, speed, fruits;
let started=false, gameOver=false;

// ===== PALETAS =====
const palettes=[
  {bg:"#1a1a2e", snake:"#00ffff", food:"#ff0033"},
  {bg:"#0f3d3e", snake:"#39ff14", food:"#ff00ff"},
  {bg:"#5a0fd6", snake:"#00bfff", food:"#ffea00"},
  {bg:"#3a0ca3", snake:"#ff00ff", food:"#00ffcc"},
];

let currentPalette=palettes[0];

// ===== AUDIO =====
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let musicOn=false,lastNote=0,step=0;

function beep(f,d){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=f;
  g.gain.value=0.05;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.stop(audioCtx.currentTime+d);
}

function updateMusic(){
 if(!musicOn || !musicEnabled) return;

  if(Date.now() - musicTimer > speed){ //  sincroniza con velocidad del juego
    const notes = songs[currentSong];

    beep(notes[musicStep % notes.length], 0.1);

    musicStep++;
    musicTimer = Date.now();
  }
}
function playEatSound(){
if(!musicOn || !sfxEnabled) return;

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.connect(g);
  g.connect(audioCtx.destination);

  o.type = "square";
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);

  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

  o.start();
  o.stop(audioCtx.currentTime + 0.15);
}

function playGameOverSound(){
  if(!musicOn) return;

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.connect(g);
  g.connect(audioCtx.destination);

  o.type = "sawtooth";
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);

  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

  o.start();
  o.stop(audioCtx.currentTime + 0.5);
}



// ===== INIT =====
function init(){
  overlay.innerHTML = "";
    const lb = document.getElementById("leaderboard");
  if (lb) lb.remove();

  const cx=10,cy=10;
  document.getElementById("blackout").style.opacity = "0";
snake = [
  {x:cx,y:cy, px:cx, py:cy},
  {x:cx-1,y:cy, px:cx-1, py:cy},
  {x:cx-2,y:cy, px:cx-2, py:cy}
];

  velocity={x:0,y:0};
  nextVelocity={x:0,y:0};

  score=0; level=1; speed=120; fruits=0;
  started=false; gameOver=false;

  currentPalette=palettes[0];

  spawnFood();
  updateHUD();

  renderStartScreen();
  loadScrollingScores();
  draw();
}

// ===== FOOD =====
function spawnFood(){
  while(true){
    const f={x:Math.random()*tiles|0,y:Math.random()*tiles|0};
    if(!snake.some(s=>s.x===f.x&&s.y===f.y)){
      food=f;
      foodSpawnTime = Date.now(); //  ACÁ
      return;
    }
  }
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{

  if(document.activeElement.tagName === "INPUT") return;
  const map={
    ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},
    ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    
    
  };

  if(!started && e.key === "ArrowLeft") return;
  e.preventDefault();

  if(!started){
    started=true;
    overlay.innerHTML="";
    velocity=map[e.key];
    nextVelocity=map[e.key];

    document.getElementById("scrollScores").style.display="none";

    audioCtx.resume().then(()=>musicOn=true);
    requestAnimationFrame(loop);
    return;
  }

  const dir=map[e.key];
  if(velocity.x+dir.x===0&&velocity.y+dir.y===0)return;
  nextVelocity=dir;

},{passive:false});

// ===== LOOP =====
function loop(time){
  if(gameOver) return;

  if(!lastTime) lastTime = time;

  const delta = time - lastTime;

  updateMusic();

  moveProgress += delta / speed;

  if(moveProgress >= 1){
    updateLogic();
    moveProgress = 0;
  }

  drawInterpolated(moveProgress);

  lastTime = time;
  requestAnimationFrame(loop);
}
// ===== UPDATE =====
function updateLogic(){
  velocity=nextVelocity;

  const head={x:snake[0].x+velocity.x,y:snake[0].y+velocity.y};

  if(head.x<0||head.y<0||head.x>=tiles||head.y>=tiles)return endGame();
  if(snake.some(s=>s.x===head.x&&s.y===head.y))return endGame();

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    const now = Date.now();
const diff = (now - foodSpawnTime) / 1000; // en segundos

let points = 10;

if(diff > 1 && diff < 3){
  points = 30;
}else if(diff >= 3 && diff < 6){
  points = 20;
}else if(diff >= 6){
  points = 10;
}

score += points;
    fruits++;
    playEatSound();
    spawnFood();

    if(fruits%5===0){
      level++;
     // speed=Math.max(50,speed-10);
     speed = Math.max(60, 120 - level * 8);
    currentSong = (level - 1) % songs.length;

    // reset musical limpio
    musicStep = 0;
    musicTimer = 0;
    
      if(ENABLE_COLOR_CHANGE){
        currentPalette=palettes[(level-1)%palettes.length];
      }
    }

    updateHUD();
  }else snake.pop();
  snake[0].px = snake[0].x;
snake[0].py = snake[0].y;

for(let i=1;i<snake.length;i++){
  snake[i].px = snake[i].x;
  snake[i].py = snake[i].y;
}
}

// ===== DRAW =====
function drawInterpolated(t){
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle = currentPalette.bg;
  ctx.fillRect(0,0,400,400);

  // glow snake
  ctx.shadowColor = currentPalette.snake;
  ctx.shadowBlur = 10;
  ctx.fillStyle = currentPalette.snake;

  snake.forEach(s=>{
    const px = lerp(s.x, s.px, t);
    const py = lerp(s.y, s.py, t);

    ctx.fillRect(px*grid, py*grid, grid-2, grid-2);
  });

  // food
  ctx.shadowColor = currentPalette.food;
  ctx.shadowBlur = 14;
  ctx.fillStyle = currentPalette.food;

  ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);
}

// ===== HUD =====
function updateHUD(){
  scoreEl.innerText="Score: "+score;
  levelEl.innerText="Lvl: "+level;
}

// ===== SUPABASE =====
async function saveScore(name){
  const {error}=await sb.from("scores").insert([
    {player:name,score:score,level:level}
  ]);

  if(error){
    alert("Error: "+error.message);
  }else{
    renderLeaderboard();
  }
}

async function renderLeaderboard(includeLast=false, forceShow=true){
const existing = document.getElementById("leaderboard");
if(existing) existing.remove();
  const {data} = await sb.from("scores")
    .select("*")
    .order("score",{ascending:false})
    .limit(5);

  // 🔎 buscamos si ya existe
  let container = document.getElementById("leaderboard");

  // 👉 si NO existe, lo creamos
  if(!container){
    container = document.createElement("div");
    container.id = "leaderboard";

    // importante: lo agregamos al overlay
    overlay.appendChild(container);
  }

  const html = data.map((s,i)=>{
    const highlight = (includeLast && s.score === score)
      ? "color:#00ffff;font-weight:bold;"
      : "";

    return `<div style="${highlight}">
      ${i+1}. ${s.player} - ${s.score}
    </div>`;
  }).join("");

  container.innerHTML = `
    <h3>TOP SCORES</h3>
    ${html}
  `;
}


function renderStartScreen(){
  overlay.innerHTML = `
    <h2>START...</h2>
    <p style="font-size:14px; margin-top:10px;">
      Use arrow keys to move.
    </p>

  
  `;

renderLeaderboard();
}



// ===== GAME OVER =====
function endGame(){
  gameOver = true;
  playGameOverSound();
const blackout = document.getElementById("blackout");
  blackout.style.opacity = "1";
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <div>${score}</div>

    <input id="name" placeholder="Nombre"/>

    <button id="saveBtn" class="neon-btn">
      GUARDAR
    </button>

    <button id="retryBtn" class="neon-btn">
      REINTENTAR
    </button>
  `;

  document.getElementById("saveBtn").onclick = submitScore;
  document.getElementById("retryBtn").onclick = init;
}

async function submitScore(){
  const nameInput = document.getElementById("name");
  const saveBtn = document.getElementById("saveBtn");

  const name = nameInput.value || "Anon";

  //  evitar doble click
  saveBtn.disabled = true;
  saveBtn.innerText = "Guardando...";

  await saveScore(name);

  //  eliminar input y botón guardar
  nameInput.remove();
  saveBtn.remove();

  // ⬆ mover botón reiniciar
  const retryBtn = document.getElementById("retryBtn");
  retryBtn.style.marginTop = "10px";

  //  mostrar ranking actualizado
  renderLeaderboard(true);
}
const musicBtn = document.getElementById("musicBtn");
const sfxBtn = document.getElementById("sfxBtn");

musicBtn.addEventListener("click", () => {
  musicEnabled = !musicEnabled;
  musicBtn.classList.toggle("active", musicEnabled);
});

sfxBtn.addEventListener("click", () => {
  sfxEnabled = !sfxEnabled;
  sfxBtn.classList.toggle("active", sfxEnabled);
});
musicBtn.classList.add("active");
sfxBtn.classList.add("active");

// ===== START =====
init();

</script>
</body>
</html>
